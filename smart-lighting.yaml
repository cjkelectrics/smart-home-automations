blueprint:
  name: Smart Lighting - Adaptive Brightness
  description: Automatically adjusts brightness based on time and motion
  domain: automation

  input:
    light_target:
      name: Light
      selector:
        entity:
          domain: light

    motion_sensor:
      name: Motion Sensor
      selector:
        entity:
          domain: binary_sensor

    night_start:
      name: Night Time Start
      default: "23:00:00"
      selector:
        time:

    night_end:
      name: Night Time End
      default: "06:00:00"
      selector:
        time:

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

action:
  - choose:

      # 🌙 Night (dim light)
      - conditions:
          - condition: time
            after: !input night_start
            before: !input night_end
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness: 30

      # ☀️ Day (full brightness)
      - conditions:
          - condition: sun
            after: sunrise
            before: sunset
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness: 255

    default:
      # 🌆 Evening (medium brightness)
      - service: light.turn_on
        target:
          entity_id: !input light_target
        data:
          brightness: 120

mode: restart
